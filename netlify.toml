[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."canvas-to-notion"]
  timeout = 26

# Background functions have no timeout cap (up to 15 min)
# No explicit config needed — Netlify detects the -background suffix

[dev]
  framework = "#static"
  publish = "."
  port = 8080

# CORS headers for both function endpoints
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin  = "*"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"
